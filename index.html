<!DOCTYPE html>
<html>
<head>
    <title>Vistora</title>
    <style>
        body {
            margin: 0;
            background: #0b0b0b;
            color: white;
            font-family: Arial, sans-serif;
        }

        header {
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            color: #e50914;
        }

        .banner {
            height: 350px;
            display: flex;
            align-items: center;
            padding-left: 50px;
            background: linear-gradient(to right, #000, transparent),
            url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");
            background-size: cover;
            background-position: center;
        }

        .banner h1 {
            font-size: 50px;
        }

        .section {
            padding: 30px;
        }

        .movies {
            display: flex;
            gap: 20px;
        }

        .card {
            width: 160px;
            height: 240px;
            background: #222;
            border-radius: 10px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.08);
        }
    </style>
</head>

<body>

<header>
    🎬 Vistora
</header>

<div class="banner">
    <h1>Welcome to Vistora</h1>
</div>

<div class="section">
    <h2>🔥 Trending</h2>

    <div class="movies">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>
</div>

<div class="section">
    <h2>⭐ Recently Added</h2>

    <div class="movies">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>
</div>

</body>
</html>

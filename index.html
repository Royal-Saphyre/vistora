<!DOCTYPE html>
<html>
<head>
    <title>Vistora</title>

    <style>
        body {
            margin: 0;
            background: #0b0b0b;
            color: white;
            font-family: Arial, sans-serif;
        }

        header {
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            color: #e50914;
        }

        .banner {
            height: 350px;
            display: flex;
            align-items: center;
            padding-left: 50px;
            background: linear-gradient(to right, #000, transparent),
            url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");
            background-size: cover;
            background-position: center;
        }

        .banner h1 {
            font-size: 50px;
        }

        .section {
            padding: 30px;
        }

        .movies {
            display: flex;
            gap: 20px;
        }

        .card {
            width: 180px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .card h3 {
            margin: 0;
            padding: 10px;
        }

        .card:hover {
            transform: scale(1.08);
        }

    </style>
</head>

<body>

<header>
    🎬 Vistora
</header>


<div class="banner">
    <h1>Welcome to Vistora</h1>
</div>


<div class="section">

    <h2>🔥 Trending</h2>

    <div class="movies">

        <div class="card">
            <img src="images/posters/Lingam.png">
            <h3>Lingam</h3>
        </div>

        <div class="card">
            <img src="images/posters/Dunki.jpg">
            <h3>Dunki</h3>
        </div>

        <div class="card">
            <img src="images/posters/Jawan.jpg">
            <h3>Jawan</h3>
        </div>

        <div class="card">
            <img src="images/posters/Pathaan.jpg">
            <h3>Pathaan</h3>
        </div>

    </div>

</div>


<div class="section">

    <h2>⭐ Recently Added</h2>

    <div class="movies">

        <div class="card">
            <img src="images/posters/Lingam.png">
            <h3>Lingam</h3>
        </div>

    </div>

</div>


</body>
</html>
